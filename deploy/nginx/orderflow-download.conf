server {
    listen 80;
    listen [::]:80;
    server_name download.ausmet.ai;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name download.ausmet.ai;

    ssl_certificate /etc/letsencrypt/live/download.ausmet.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/download.ausmet.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /srv/orderflow-download/public;
    autoindex off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /latest.json {
        default_type application/json;
        try_files $uri =404;
        add_header Cache-Control "no-store, max-age=0" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /releases/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        return 404;
    }
}
