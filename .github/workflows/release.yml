name: Build Release

"on":
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24"
  ASSET_BASENAME: "orderflow-desktop"

jobs:
  test:
    name: TypeScript Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-python-runner.txt

      - name: Install dependencies
        run: npm ci

      - name: Install Python runner dependencies
        run: python -m pip install -r requirements-python-runner.txt pytest

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Run Python rule regression tests
        run: python -m pytest -q tests/test_desktop_runner.py tests/test_hardware_rules.py tests/test_jobtrack_compare.py

      - name: Run local-only invariant
        run: npm test -- src/packaging/localOnlyInvariant.test.ts

  build-windows:
    name: Build Windows Portable EXE
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-python-runner.txt

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Cache Python rules runner
        id: cache-python-runner
        uses: actions/cache@v4
        with:
          path: python-helper
          key: ${{ runner.os }}-python-runner-${{ hashFiles('requirements-python-runner.txt', 'python_extraction_bridge.py', 'desktop_runner.py', 'extract.py', 'rules/**', 'scripts/build-python-runner-win.ps1') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Python runner dependencies
        if: steps.cache-python-runner.outputs.cache-hit != 'true'
        run: python -m pip install -r requirements-python-runner.txt

      - name: Build Python rules runner
        if: steps.cache-python-runner.outputs.cache-hit != 'true'
        shell: pwsh
        run: ./scripts/build-python-runner-win.ps1

      - name: Write release build info
        shell: pwsh
        run: |
          Set-Content -Path src/core/buildInfo.ts -Value 'export const CURRENT_RELEASE_TAG = "build-${{ github.run_number }}";'

      - name: Build Windows portable exe
        run: npm run dist:win:ci

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET_BASENAME }}-windows.exe
          path: release/${{ env.ASSET_BASENAME }}-windows.exe
          if-no-files-found: error

      - name: Enforce Gitee 100 MB asset limit
        shell: pwsh
        run: |
          $asset = Get-Item "release/${{ env.ASSET_BASENAME }}-windows.exe"
          if ($asset.Length -ge 100MB) {
            throw "Windows artifact is $($asset.Length) bytes; Gitee requires it to be smaller than 100 MB."
          }

  build-macos:
    name: Build macOS DMG
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-python-runner.txt

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Cache Python rules runner
        id: cache-python-runner
        uses: actions/cache@v4
        with:
          path: python-helper
          key: ${{ runner.os }}-python-runner-${{ hashFiles('requirements-python-runner.txt', 'python_extraction_bridge.py', 'desktop_runner.py', 'extract.py', 'rules/**', 'scripts/build-python-runner-mac.sh') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Python runner dependencies
        if: steps.cache-python-runner.outputs.cache-hit != 'true'
        run: python -m pip install -r requirements-python-runner.txt

      - name: Build Python rules runner
        if: steps.cache-python-runner.outputs.cache-hit != 'true'
        run: bash ./scripts/build-python-runner-mac.sh

      - name: Write release build info
        shell: bash
        run: |
          printf 'export const CURRENT_RELEASE_TAG = "build-%s";\n' "${{ github.run_number }}" > src/core/buildInfo.ts

      - name: Build macOS dmg
        run: npm run dist:mac:ci

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET_BASENAME }}-mac.dmg
          path: release/${{ env.ASSET_BASENAME }}-mac.dmg
          if-no-files-found: error

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - test
      - build-windows
      - build-macos
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ASSET_BASENAME }}-windows.exe
          path: release-assets

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ASSET_BASENAME }}-mac.dmg
          path: release-assets

      - name: Publish direct download release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="build-${GITHUB_RUN_NUMBER}"
          gh release create "$tag" \
            "release-assets/${{ env.ASSET_BASENAME }}-windows.exe#${{ env.ASSET_BASENAME }}-windows.exe" \
            "release-assets/${{ env.ASSET_BASENAME }}-mac.dmg#${{ env.ASSET_BASENAME }}-mac.dmg" \
            --title "订单整理助手 ${tag}" \
            --notes "Windows 便携版和 macOS DMG 已自动生成。Windows 下载 orderflow-desktop-windows.exe；Mac 下载 orderflow-desktop-mac.dmg。" \
            --target "$GITHUB_SHA" \
            --latest

  publish-gitee-release:
    name: Mirror Source and Publish Gitee Release
    runs-on: ubuntu-latest
    needs:
      - publish-release
    if: github.ref == 'refs/heads/main'
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      GITEE_USERNAME: wei-dongyu_1_0
      GITEE_REPOSITORY: wei-dongyu_1_0/OrderFlow
    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require Gitee release credentials
        shell: bash
        run: test -n "$GITEE_TOKEN"

      - name: Mirror source and tags to Gitee
        shell: bash
        run: |
          git remote add gitee "https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPOSITORY}.git"
          git push gitee HEAD:main --force
          git push gitee --tags --force
          git remote remove gitee

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ASSET_BASENAME }}-windows.exe
          path: release-assets

      - name: Publish Gitee Windows release
        shell: bash
        env:
          GITEE_TAG: build-${{ github.run_number }}
          GITEE_TARGET: ${{ github.sha }}
          GITEE_ASSET: release-assets/orderflow-desktop-windows.exe
        run: bash ./scripts/publish-gitee-release.sh
