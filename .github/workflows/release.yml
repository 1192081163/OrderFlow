name: Build Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0. Re-running with the same tag overwrites the release files."
        required: true
        default: "v1.0.0"

permissions:
  contents: write

env:
  NODE_VERSION: "22"
  ASSET_BASENAME: "order-organizer-assistant"

jobs:
  test:
    name: TypeScript Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install Python runner dependencies
        run: python -m pip install -r requirements-python-runner.txt

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install Python runner dependencies
        run: python -m pip install -r requirements-python-runner.txt

      - name: Build Python rules runner
        shell: pwsh
        run: ./scripts/build-python-runner-win.ps1

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/${{ env.ASSET_BASENAME }}-windows.exe
          if-no-files-found: error

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG_NAME=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "TAG_NAME=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$TAG_NAME" --latest
          else
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "订单整理助手 $TAG_NAME" --target "$GITHUB_SHA" --latest
          fi

      - name: Upload release files and overwrite same-version assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          for old_asset in \
            "${{ env.ASSET_BASENAME }}-windows.exe"; do
            gh release delete-asset "$TAG_NAME" --yes -- "$old_asset" >/dev/null 2>&1 || true
          done
          gh release upload "$TAG_NAME" \
            "release-assets/windows-installer/${{ env.ASSET_BASENAME }}-windows.exe" \
            --clobber
